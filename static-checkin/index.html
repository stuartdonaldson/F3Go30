<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>F3 Go30 Check-in</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 480px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 1.2rem; margin: 0 0 4px; }
  .sub { color: #666; margin: 0 0 16px; }
  .hidden { display: none !important; }
  .row { display: flex; gap: 8px; margin: 8px 0; }
  button { font: inherit; padding: 8px 12px; border-radius: 6px; border: 1px solid #ccc; background: #f7f7f7; cursor: pointer; }
  button.current { background: #2a7; color: #fff; border-color: #2a7; }
  button:disabled { opacity: .5; cursor: default; }
  .status-note { font-size: .85rem; color: #666; margin: 4px 0 12px; }
  .goals-reminder { border: 1px solid #ddd; border-radius: 8px; padding: 8px 12px; margin: 12px 0; font-size: .9rem; }
  .goals-reminder-row strong { display: inline-block; width: 3.5em; }
  #calGrid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin: 8px 0; }
  .cal-cell { position: relative; padding: 6px 0; border: 1px solid #ddd; background: #fafafa; font-size: .8rem; }
  .cal-cell.pad { visibility: hidden; }
  .cal-cell.today { border-color: #08f; }
  .cal-cell.selected { outline: 2px solid #08f; }
  .cal-cell.st-done { background: #dcf8e4; }
  .cal-cell.st-missed { background: #fde3e3; }
  .cal-cell.st-absent { background: #eee; color: #999; }
  .cal-cell .x-mark::after { content: '\2715'; position: absolute; top: 0; right: 2px; font-size: .7rem; color: #c00; }
  #apiErrorBanner { background: #fee; border: 1px solid #c00; padding: 8px 12px; border-radius: 6px; margin: 12px 0; font-size: .85rem; white-space: pre-wrap; }
  #dashboardSummary { border-top: 1px solid #ddd; margin-top: 16px; padding-top: 12px; font-size: .9rem; }
  #dashboardSummary.loading { color: #999; }
  .team-row { display: flex; justify-content: space-between; padding: 2px 0; }
</style>
</head>
<body>

<div id="step-config" class="hidden">
  <h1>Configuration error</h1>
  <p class="sub">This page needs both <code>?webapp=&lt;GAS /exec URL&gt;</code> and <code>?id=&lt;token&gt;</code> in its URL.</p>
</div>

<div id="step-loading">
  <h1>Signing you in&hellip;</h1>
</div>

<div id="step-notfound" class="hidden">
  <h1>Link not recognized</h1>
  <p class="sub">This saved link is no longer valid. Ask your Site Q for a fresh one, or use the regular check-in page.</p>
</div>

<div id="step-checkin" class="hidden">
  <h1 id="headerName"></h1>
  <p class="sub" id="headerSub"></p>
  <p class="sub" id="checkinSub"></p>

  <div id="goalsReminder" class="hidden"></div>

  <div id="apiErrorBanner" class="hidden"></div>

  <div>
    <strong>Today</strong>
    <p class="status-note" id="todayStatusNote"></p>
    <div class="row">
      <button id="todayYesBtn">I Hit it</button>
      <button id="todayNoBtn">I Missed it</button>
      <button id="todayNoneBtn">No check-in</button>
    </div>
  </div>

  <div id="yesterdayBlock">
    <strong>Yesterday</strong>
    <p class="status-note" id="yesterdayStatusNote"></p>
    <div class="row">
      <button id="yesterdayYesBtn">I Hit it</button>
      <button id="yesterdayNoBtn">I Missed it</button>
      <button id="yesterdayNoneBtn">No check-in</button>
    </div>
  </div>

  <h2 style="font-size:1rem;margin-top:16px;">Month calendar</h2>
  <div id="calGrid"></div>
  <div id="selectionPanel" class="hidden">
    <p class="sub" id="selectedDateLabel"></p>
    <div class="row">
      <button id="selYesBtn">Hit it</button>
      <button id="selNoBtn">Missed it</button>
      <button id="selNoneBtn">No check-in</button>
      <button id="selFailBtn">Failed</button>
    </div>
  </div>

  <div id="dashboardSummary" class="loading">Loading dashboard&hellip;</div>
</div>

<script>
(function() {
  'use strict';

  function $(id) { return document.getElementById(id); }
  function showStep(name) {
    ['config', 'loading', 'notfound', 'checkin'].forEach(function(s) {
      $('step-' + s).classList.toggle('hidden', s !== name);
    });
  }

  var params = new URLSearchParams(location.search);
  var WEBAPP_URL = params.get('webapp');
  var TOKEN = params.get('id');
  var NS = params.get('ns') || '';
  var CONTEXT_DATE = params.get('contextDate') || '';

  if (!WEBAPP_URL || !TOKEN) {
    showStep('config');
    return;
  }

  var state = { f3Name: null, email: null, resolvedContext: null, monthGrid: [], selectedDateIso: null };

  // Same "simple request" pattern as CheckinApp.html's callApi (IdentityCore.html) — a
  // text/plain POST skips CORS preflight, and the SIT spike (F3Go30-5nfj.2) confirmed the
  // GAS /exec response (after its 302 -> googleusercontent.com redirect) carries
  // Access-Control-Allow-Origin: * on both hops, so a cross-origin fetch can read the body.
  function callApi(action, payload) {
    var body = Object.assign({}, payload, { action: action, ns: NS, contextDate: CONTEXT_DATE });
    return fetch(WEBAPP_URL + '?cmd=checkin', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body),
    }).then(function(res) {
      if (!res.ok) throw new Error('Server returned HTTP ' + res.status);
      return res.json();
    }).then(function(json) {
      if (!json.ok) throw new Error(json.error || 'Server reported an error with no detail');
      return json;
    });
  }

  function showApiError_(action, err) {
    var el = $('apiErrorBanner');
    el.textContent = 'Something went wrong (' + action + '): ' + (err && err.message ? err.message : String(err));
    el.classList.remove('hidden');
  }
  function hideApiError_() { $('apiErrorBanner').classList.add('hidden'); }

  function escapeHtml_(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function isoDate_(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }
  function parseIsoDate_(iso) {
    var parts = iso.split('-').map(Number);
    return new Date(parts[0], parts[1] - 1, parts[2]);
  }

  function renderGoalsReminder_(goals) {
    var el = $('goalsReminder');
    var rows = [
      { label: 'WHO', value: goals && goals.who },
      { label: 'WHAT', value: goals && goals.what },
      { label: 'HOW', value: goals && goals.how },
    ].filter(function(r) { return r.value; });
    if (!rows.length) { el.classList.add('hidden'); el.innerHTML = ''; return; }
    el.innerHTML = '<div class="goals-reminder-head"><strong>Your goals</strong></div>' +
      rows.map(function(r) {
        return '<div class="goals-reminder-row"><strong>' + r.label + ':</strong> ' + escapeHtml_(r.value) + '</div>';
      }).join('');
    el.classList.remove('hidden');
  }

  var CHECKIN_STATUS_TEXT_ = {
    done: '✓ You said: I Hit it!',
    missed: '✗ You said: Missed it',
    pending: 'No check-in yet',
    absent: 'Marked absent by your Q',
    unavailable: 'No tracker day for this date yet',
  };

  function renderCheckinStatus_(prefix, status) {
    var yesBtn = $(prefix + 'YesBtn'), noBtn = $(prefix + 'NoBtn'), noneBtn = $(prefix + 'NoneBtn');
    $(prefix + 'StatusNote').textContent = CHECKIN_STATUS_TEXT_[status] || '';
    yesBtn.classList.toggle('current', status === 'done');
    noBtn.classList.toggle('current', status === 'missed');
    noneBtn.classList.toggle('current', status === 'pending');
    var disabled = status === 'unavailable';
    yesBtn.disabled = disabled; noBtn.disabled = disabled; noneBtn.disabled = disabled;
  }

  function valueToCheckinStatus_(value) {
    return value === 1 ? 'done' : value === 0 ? 'missed' : value === -1 ? 'absent' : 'pending';
  }

  function submitCheckin_(btn, day, value) {
    hideApiError_();
    btn.disabled = true;
    callApi('checkin', { f3Name: state.f3Name, email: state.email, day: day, value: value, resolvedContext: state.resolvedContext })
      .then(function() {
        var status = valueToCheckinStatus_(value);
        var dateIso = day === 'today' ? state.todayIso : day === 'yesterday' ? state.yesterdayIso : day;
        if (day === 'today' || day === 'yesterday') renderCheckinStatus_(day, status);
        var entry = (state.monthGrid || []).filter(function(e) { return e.dateIso === dateIso; })[0];
        if (entry) entry.status = status;
        renderCalendar_();
        if (state.selectedDateIso === dateIso) renderSelectionPanel_(dateIso);
      })
      .catch(function(err) { showApiError_('checkin', err); })
      .finally(function() { btn.disabled = false; });
  }

  $('todayYesBtn').addEventListener('click', function() { submitCheckin_(this, 'today', 1); });
  $('todayNoBtn').addEventListener('click', function() { submitCheckin_(this, 'today', 0); });
  $('todayNoneBtn').addEventListener('click', function() { submitCheckin_(this, 'today', null); });
  $('yesterdayYesBtn').addEventListener('click', function() { submitCheckin_(this, 'yesterday', 1); });
  $('yesterdayNoBtn').addEventListener('click', function() { submitCheckin_(this, 'yesterday', 0); });
  $('yesterdayNoneBtn').addEventListener('click', function() { submitCheckin_(this, 'yesterday', null); });

  function isStrictlyPastCalendarDate_(iso) {
    return iso < state.todayIso;
  }

  function renderSelectionPanel_(dateIso) {
    var entry = (state.monthGrid || []).filter(function(e) { return e.dateIso === dateIso; })[0];
    if (!entry) return;
    $('selectionPanel').classList.remove('hidden');
    $('selectedDateLabel').textContent = dateIso + ': ' + (CHECKIN_STATUS_TEXT_[entry.status] || entry.status);
    $('selFailBtn').disabled = !isStrictlyPastCalendarDate_(dateIso);
  }

  $('selYesBtn').addEventListener('click', function() { submitCheckin_(this, state.selectedDateIso, 1); });
  $('selNoBtn').addEventListener('click', function() { submitCheckin_(this, state.selectedDateIso, 0); });
  $('selNoneBtn').addEventListener('click', function() { submitCheckin_(this, state.selectedDateIso, null); });
  $('selFailBtn').addEventListener('click', function() { submitCheckin_(this, state.selectedDateIso, -1); });

  function renderCalendar_() {
    var grid = $('calGrid');
    grid.innerHTML = '';
    var entries = state.monthGrid || [];
    if (!entries.length) return;
    var firstDow = parseIsoDate_(entries[0].dateIso).getDay();
    for (var p = 0; p < firstDow; p++) {
      var pad = document.createElement('div');
      pad.className = 'cal-cell pad';
      grid.appendChild(pad);
    }
    entries.forEach(function(entry) {
      var d = parseIsoDate_(entry.dateIso);
      var cell = document.createElement('button');
      cell.type = 'button';
      cell.className = 'cal-cell st-' + entry.status +
        (entry.dateIso === state.todayIso ? ' today' : '') +
        (entry.dateIso === state.selectedDateIso ? ' selected' : '');
      cell.dataset.date = entry.dateIso;
      cell.textContent = String(d.getDate());
      if (entry.status === 'absent') cell.classList.add('x-mark');
      cell.addEventListener('click', function() {
        state.selectedDateIso = entry.dateIso;
        renderCalendar_();
        renderSelectionPanel_(entry.dateIso);
      });
      grid.appendChild(cell);
    });
  }

  function renderDashboardSummary_(d) {
    var el = $('dashboardSummary');
    el.classList.remove('loading');
    var teamRows = (d.myTeam || []).map(function(m) {
      return '<div class="team-row"><span>' + escapeHtml_(m.name) + '</span><span>' + (m.scorePct != null ? m.scorePct + '%' : '') + '</span></div>';
    }).join('');
    el.innerHTML = '<strong>' + escapeHtml_(d.monthLabel) + ' dashboard</strong>' +
      '<div>Score: ' + (d.scorePct != null ? d.scorePct + '%' : 'n/a') + ' · Streak: ' + (d.streak || 0) + '</div>' +
      '<div style="margin-top:8px;">' + teamRows + '</div>';
  }

  function prefetchDashboard_() {
    callApi('dashboard', { f3Name: state.f3Name, email: state.email, resolvedContext: state.resolvedContext })
      .then(renderDashboardSummary_)
      .catch(function(err) {
        $('dashboardSummary').classList.remove('loading');
        $('dashboardSummary').textContent = 'Dashboard unavailable: ' + (err && err.message ? err.message : String(err));
      });
  }

  function applyIdentifySuccess_(res) {
    state.f3Name = res.f3Name;
    state.email = res.email;
    state.resolvedContext = res.resolvedContext || null;
    state.monthGrid = res.monthGrid || [];
    var today = new Date();
    state.todayIso = isoDate_(today);
    var yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);
    state.yesterdayIso = isoDate_(yesterday);
    state.selectedDateIso = null;

    $('headerName').textContent = res.f3Name;
    $('headerSub').textContent = res.team || '';
    $('checkinSub').textContent = res.monthLabel + ' — how did you do on your commitment for today?';
    renderGoalsReminder_(res.goals);
    renderCheckinStatus_('today', res.todayStatus);
    $('yesterdayBlock').classList.toggle('hidden', !res.yesterdayAvailable);
    if (res.yesterdayAvailable) renderCheckinStatus_('yesterday', res.yesterdayStatus);
    renderCalendar_();
    showStep('checkin');
    // Deferred, background fetch (F3Go30-5nfj.2 scope item 3) — same principle as the GAS page's
    // prefetchDashboard_: the PAX is still reading the check-in view while this resolves.
    prefetchDashboard_();
  }

  showStep('loading');
  callApi('identify', { token: TOKEN })
    .then(function(res) {
      if (res.matched) {
        applyIdentifySuccess_(res);
      } else {
        // tokenInvalid and knownPaxNotRegistered both fall through to the same "link not
        // recognized" state here — this static page has no signup flow to hand off into
        // (out of scope per the issue), unlike the GAS page's attemptTopRedirect_ path.
        showStep('notfound');
      }
    })
    .catch(function() { showStep('notfound'); });
})();
</script>
</body>
</html>

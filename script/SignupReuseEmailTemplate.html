<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
  </head>
  <body style="margin:0;padding:0;background:#f4f1ea;font-family:Arial,sans-serif;color:#222;line-height:1.5;">
    <div style="max-width:680px;margin:0 auto;padding:24px;">
      <div style="background:#fffdf8;border:1px solid #d8cfbf;border-radius:12px;overflow:hidden;">
        <div style="background:#2f5d50;color:#f8f4ea;padding:20px 24px;">
          <div style="font-size:12px;letter-spacing:0.08em;text-transform:uppercase;opacity:0.9;">F3 Go30</div>
          <h1 style="margin:8px 0 0;font-size:20px;line-height:1.2;"><?= headline ?></h1>
        </div>

        <div style="padding:24px;">
          <p style="margin:0 0 16px;">Hi <?= f3Name || 'there' ?>,</p>

          <p style="margin:0 0 16px;"><?= intro ?></p>

          <? if (showSummary && summaryLines && summaryLines.length) { ?>
            <p style="margin:0 0 16px;"><?= summaryIntro ?></p>
            <div style="margin:0 0 16px;padding:12px;background:#f3efe4;border-left:4px solid #b8860b;border-radius:8px;font-size:14px;">
              <? for (var i = 0; i < summaryLines.length; i++) { ?>
                <div><?= summaryLines[i] ?></div>
              <? } ?>
            </div>
          <? } ?>

          <? if (checkinUrl) { ?>
            <div style="margin:20px 0 8px;border-top:1px solid #e6ddcc;padding-top:20px;">
              <h2 style="margin:0 0 8px;font-size:18px;color:#2f5d50;"><?= copy.checkinHeading ?></h2>
            </div>
            <p style="margin:0 0 14px;"><?= copy.checkinIntro ?></p>
            <p style="margin:0 0 14px;">
              <a href="<?= checkinUrl ?>" style="display:inline-block;background:#2f5d50;color:#f8f4ea;text-decoration:none;font-weight:bold;padding:11px 20px;border-radius:8px;"><?= copy.checkinLabel ?></a>
            </p>
            <p style="margin:0 0 20px;font-size:13px;color:#555;"><?= copy.dashboardNote ?></p>
          <? } ?>

          <? if (editGoalsUrl) { ?>
            <h3 style="margin:0 0 6px;font-size:15px;"><?= copy.editHeading ?></h3>
            <p style="margin:0 0 8px;"><?= copy.editIntro ?></p>
            <p style="margin:0 0 20px;"><a href="<?= editGoalsUrl ?>" style="color:#0b5c86;font-weight:bold;"><?= copy.editLabel ?></a></p>
          <? } ?>

          <? if (trackerUrl) { ?>
            <p style="margin:0 0 16px;font-size:13px;color:#555;"><?= copy.trackerIntro ?> <a href="<?= trackerUrl ?>" style="color:#0b5c86;"><?= copy.trackerLabel ?></a></p>
          <? } ?>

          <p style="margin:20px 0 0;">Thanks,<br>F3 Go30</p>
          <p style="margin:6px 0 0;font-size:11px;color:#888;">Version: <?= appVersion || 'unknown' ?></p>
        </div>
      </div>
    </div>
  </body>
</html>
